{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card p-4 p-md-5 glass-card-hover">
            <h2 class="mb-4 text-center">編輯紀錄</h2>
            
            <form action="{{ url_for('main.update_record', id=record.id) }}" method="POST">
                <div class="mb-4">
                    <label for="type" class="form-label text-muted">類型</label>
                    <select class="form-select" id="type" name="type" required>
                        <option value="expense" {% if record.type == 'expense' %}selected{% endif %}>支出 (Expense)</option>
                        <option value="income" {% if record.type == 'income' %}selected{% endif %}>收入 (Income)</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label for="title" class="form-label text-muted">明細名稱</label>
                    <input type="text" class="form-control" id="title" name="title" value="{{ record.title }}" required>
                </div>
                
                <div class="mb-4">
                    <label for="amount" class="form-label text-muted">金額</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-white">$</span>
                        <input type="number" class="form-control" id="amount" name="amount" min="1" value="{{ record.amount }}" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="date" class="form-label text-muted">發生日期</label>
                    <input type="date" class="form-control" id="date" name="date" value="{{ record.date.strftime('%Y-%m-%d') }}" required>
                </div>

                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-primary-custom btn-lg py-3 rounded-pill">儲存變更</button>
                </div>
            </form>
        </div>
        
        <div class="text-center mt-4">
            <a href="{{ url_for('main.index') }}" class="text-decoration-none text-muted opacity-75">← 返回首頁</a>
        </div>
    </div>
</div>
{% endblock %}
